<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN Client</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="container">
    <button id="vpn-btn" class="state-stopped">
      <span id="btn-text">START</span>
      <div id="spinner" class="hidden"></div>
    </button>
    <div id="error-msg"></div>

    <div id="settings-panel">
      <div class="settings-title">Исключения (по одному пакету на строку)</div>
      <textarea id="bypass-apps" spellcheck="false" placeholder="ru.sberbankmobile&#10;ru.yandex.searchplugin"></textarea>
      <button id="save-apps-btn">Сохранить</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
